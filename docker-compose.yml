version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: career_guidance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/career_guidance
      JWT_SECRET: career_guidance_secret_2024
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
